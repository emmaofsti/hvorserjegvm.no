name: Oppdater VM-kamper

on:
  schedule:
    # Kjører hver 6. time under VM (11. juni – 19. juli 2026)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Manuell trigger

jobs:
  update-matches:
    runs-on: ubuntu-latest
    # Bare kjør under VM-perioden (juni-juli 2026), eller ved manuell trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule')

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Kjør oppdateringsscript
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-matches.mjs

      - name: Sjekk om noe endret seg
        id: changes
        run: |
          if git diff --quiet src/matches.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Ingen endringer i kampdata."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Kampdata oppdatert!"
            git diff --stat src/matches.json
          fi

      - name: Commit og push endringer
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/matches.json
          git commit -m "🤖 Auto-oppdater VM-kamper $(date +%Y-%m-%d)"
          git push
